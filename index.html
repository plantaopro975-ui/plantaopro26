    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <meta property="og:title" content="PlantaoPro - Gestão de Escalas" />
    <meta property="og:description" content="Sistema completo para gestão de escalas e plantões." />
    <meta property="og:type" content="website" />

    <style>
      html, body, #root {
        background-color: #030712;
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function() {
        const killLovable = () => {
          const selectors = [
            '#lovable-badge', 
            '.lovable-badge', 
            '[id*="lovable"]', 
            '[class*="lovable"]',
            'a[href*="lovable.dev"]',
            'img[alt*="Lovable"]'
          ];
          
          selectors.forEach(s => {
            document.querySelectorAll(s).forEach(el => el.remove());
          });

          // Caso o selo esteja em um Shadow DOM (técnica de ocultação)
          const allDivs = document.querySelectorAll('div[style*="position: fixed"]');
          allDivs.forEach(div => {
            if (div.shadowRoot || div.innerHTML.includes('lovable')) {
              div.remove();
            }
          });
        };

        // Roda imediatamente, após carregar e a cada 1 segundo
        killLovable();
        window.addEventListener('load', killLovable);
        setInterval(killLovable, 1000);
      })();
    </script>
  </body>
</html>
