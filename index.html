<script>
      const removeBadge = () => {
        // 1. Tenta pelo ID conhecido
        const badge = document.getElementById('lovable-badge');
        if (badge) badge.remove();

        // 2. Tenta por seletores de atributo (mesmo que o ID mude)
        const selectors = [
          '[id*="lovable"]',
          '[class*="lovable"]',
          'a[href*="lovable.dev"]',
          'img[src*="lovable"]'
        ];
        
        selectors.forEach(selector => {
          document.querySelectorAll(selector).forEach(el => el.remove());
        });
      };

      // Roda ao carregar e monitora se o selo tentar voltar
      removeBadge();
      setInterval(removeBadge, 1000);
    </script>
  </body>
</html>
