<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PlantaoPro - Gestão de Escalas</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    
    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="theme-color" content="#1BA9D2" />

    <script>
      const killBadge = () => {
        const badge = document.querySelector('#lovable-badge') || 
                      document.querySelector('a[href*="lovable.dev"]') ||
                      document.querySelector('div[style*="fixed"][style*="bottom: 0"]');
        if (badge) badge.remove();
      };
      setInterval(killBadge, 100); // Tenta remover a cada 100ms
    </script>
</head>
