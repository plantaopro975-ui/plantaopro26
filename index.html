<script>
      (function() {
        const removeLovableElements = () => {
          // 1. Procura por qualquer link que leve ao site deles
          const links = document.querySelectorAll('a');
          links.forEach(link => {
            if (link.href.includes('lovable.dev') || link.href.includes('lovable.app')) {
              // Encontrou o link? Deleta o container inteiro onde ele está
              let container = link.closest('div');
              if (container) container.remove();
              link.remove();
            }
          });

          // 2. Procura por qualquer div fixada no canto inferior direito que não seja do seu app
          const fixedDivs = document.querySelectorAll('div[style*="fixed"][style*="bottom"][style*="right"]');
          fixedDivs.forEach(div => {
            if (div.innerHTML.includes('svg') || div.shadowRoot) {
              div.remove();
            }
          });
        };

        // Executa em loop constante nos primeiros 10 segundos
        const interval = setInterval(removeLovableElements, 100);
        setTimeout(() => clearInterval(interval), 10000); 

        // Monitor de mudanças na página (MutationObserver)
        const observer = new MutationObserver(removeLovableElements);
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
